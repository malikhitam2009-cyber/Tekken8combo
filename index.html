        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1a1012 0%, #050404 100%);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* HEADER BANNER */
        .header-banner {
            background: linear-gradient(180deg, #11090a 0%, #000000 100%);
            border-bottom: 4px solid #ff1a1a;
            text-align: center;
            padding: 40px 10px;
            margin-bottom: 35px;
            position: relative;
            box-shadow: 0 10px 30px rgba(255, 26, 26, 0.15);
        }

        .header-banner h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: 6px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3), 3px 3px 0px #ff1a1a;
            transform: skewX(-10deg);
            margin-bottom: 5px;
        }

        .header-banner p {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #b0b0b0;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* DYNAMIC SEARCH BAR STYLE */
        .search-wrapper {
            margin-bottom: 45px;
            display: flex;
            justify-content: center;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            background-color: #0d0708;
            border: 2px solid #4a282c;
            border-radius: 4px;
            color: #ffffff;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .search-input:focus {
            outline: none;
            border-color: #ff1a1a;
            box-shadow: 0 0 20px rgba(255, 26, 26, 0.5);
        }

        /* STATUS DISPLAY AWAL (PROMPT & NOT FOUND) */
        .status-message-box {
            text-align: center;
            padding: 60px 20px;
            background-color: rgba(13, 7, 8, 0.6);
            border: 1px dashed #4a282c;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
        }

        .status-message-box h3 {
            font-size: 1.5rem;
            color: #b0b0b0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-message-box p {
            color: #ff1a1a;
            margin-top: 10px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* LAYOUT MAIN CONTENT */
        .main-content {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 850px) {
            .main-content { grid-template-columns: 1fr; }
        }

        /* CARD PROFIL KIRI */
        .character-card {
            border: 1px solid #2e1619;
            border-top: 4px solid #ff1a1a;
            background-color: #0d0708;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }

        /* BOX KARAKTER LANDSCAPE */
        .char-banner-box {
            width: 100%;
            height: 200px;
            border: 1px solid #4a2327;
            overflow: hidden;
            position: relative;
            background-color: #140b0d;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .char-banner-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .char-banner-placeholder {
            position: absolute;
            z-index: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: rgba(255, 26, 26, 0.04);
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
        }

        .char-name-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 18px;
            color: #ffffff;
            border-left: 5px solid #ff1a1a;
            padding-left: 12px;
        }

        .character-desc {
            font-size: 1.05rem;
            line-height: 1.6;
            text-align: justify;
            color: #c4b6b8;
        }

        /* AREA KANAN WITH DOUBLE CONTAINERS DISPLAY */
        .combo-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            color: #ffffff;
            border-bottom: 2px solid #ff1a1a;
            padding-bottom: 6px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .combo-box {
            background-color: #0d0708;
            border: 1px solid #261214;
            border-left: 5px solid #ff1a1a;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            margin-bottom: 15px;
        }

        .combo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .combo-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .combo-damage {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #ff1a1a;
            font-size: 1.2rem;
            background: rgba(255, 26, 26, 0.1);
            padding: 6px 14px;
            border: 1px solid rgba(255, 26, 26, 0.3);

            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;

        .input-btn {
            background: linear-gradient(180deg, #2b2b2b 0%, #141414 100%);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px 18px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            color: #ffffff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 8px rgba(0,0,0,0.5);
        }

        .attack-circle {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: #ffffff;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 900;
            box-shadow: 0 0 8px rgba(0, 114, 255, 0.6);

            margin-bottom: 15px;
            max-width: 100%;
            border: 1px solid #261214;
            background: #000;
            display: flex;
            justify-content: flex-start;
        }

            max-height: 220px;
            object-fit: contain;

        .combo-footer-note { font-size: 1rem; color: #9c9192; border-top: 1px dashed #261214; padding-top: 12px; }

            text-align: center;
            padding: 35px 10px;
            margin-top: 60px;
            background-color: #000000;
            border-top: 2px solid #ff1a1a;

            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffffff;

            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: skewX(-8deg);
            display: inline-block;

        // Ambil elemen HTML penting
        const searchInput = document.getElementById('charSearchInput');
        const statusBox = document.getElementById('statusMessageBox');
        const mainLayout = document.getElementById('mainDatabaseLayout');

        // Fungsi mencocokkan input ketikan dengan database secara dinamis
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();

            // Kondisi 1: Jika search bar kosong kembali ke setelan pabrik
            if (keyword === '') {
                statusBox.style.display = 'block';
                mainLayout.style.display = 'none';
                statusBox.innerHTML = `
                    <h3>Masukkan Nama Karakter</h3>
                    <p>Sistem akan menampilkan data kombo secara otomatis saat Anda mengetik.</p>
                `;
                return;
            }

            // Cari kunci objek di database yang mengandung atau mirip dengan ketikan user
            // Contoh: mengetik "ji" akan langsung mematangkan kecocokan ke "jin"
            const matchedKey = Object.keys(characterDatabase).find(key => 
                key.includes(keyword) || characterDatabase[key].name.toLowerCase().includes(keyword)
            );

            // Kondisi 2: Jika karakter ditemukan
            if (matchedKey) {
                statusBox.style.display = 'none';
                mainLayout.style.display = 'grid'; // Tampilkan layout utama database
                displayCharacterData(matchedKey);
            } else {
                // Kondisi 3: Karakter tidak ditemukan di database
                mainLayout.style.display = 'none';
                statusBox.style.display = 'block';
                statusBox.innerHTML = `
                    <h3 style="color: #ff1a1a;">Karakter "${e.target.value}" Tidak Ditemukan</h3>
                    <p style="color: #b0b0b0;">Silakan coba nama petarung Tekken 8 lainnya...</p>
                `;
            }
        });

        // Fungsi merender data karakter terpilih ke UI (Logika asli lu yang di-upgrade)
        function displayCharacterData(charKey) {
            const data = characterDatabase[charKey];
            
            document.getElementById('charName').innerText = data.name;
            document.getElementById('charDesc').innerText = data.desc;
            document.getElementById('charPlaceholder').innerText = data.name.split(' ')[0];
            
            const imgEl = document.getElementById('charImage');
            imgEl.style.display = 'block';
            imgEl.src = data.file;

            // Render box kombo pro dan populer
            const punishContainer = document.getElementById('punishCombosContainer');
            const popularContainer = document.getElementById('popularCombosContainer');
            
            punishContainer.innerHTML = '';
            popularContainer.innerHTML = '';
            
            data.punish.forEach(c => punishContainer.appendChild(createComboCard(c)));
            data.popular.forEach(c => popularContainer.appendChild(createComboCard(c)));
        }

        // Fungsi pembuat elemen card notasi tombol kombo bawaan asli lu
        function createComboCard(combo) {
            const box = document.createElement('div');
            box.className = 'combo-box';

            let movesHTML = '';
            combo.moves.forEach((move, i) => {
                movesHTML += `<div class="input-btn">${move}</div>`;
                if (i < combo.moves.length - 1) {
                    movesHTML += `<span class="silver-arrow">➔</span>`;
                }
            });

            let videoHTML = '';
            if (combo.video) {
                videoHTML = `
                    <div class="combo-video-wrapper">
                        <video autoplay loop muted playsinline>
                            <source src="${combo.video}" type="video/mp4">
                        </video>
                    </div>
                `;
            }

            box.innerHTML = `
                <div class="combo-header">
                    <span class="combo-name">${combo.name}</span>
                    <span class="combo-damage">${combo.dmg}</span>
                </div>
                ${videoHTML} 
                <div class="notation-row">
                    ${movesHTML}
                </div>
                <div class="combo-footer-note">${combo.note}</div>
            `;
            return box;
        }
    </script>
